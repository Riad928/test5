<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-[#F0F1F3] sticky top-0 z-50 shadow-md hover:shadow-xl transition duration-300">
        <div class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8 h-16 md:h-24 flex justify-between items-center">
          
            <!-- logo -->
            <div class="w-1/3">
                <a href="#" class="flex items-center gap-4">
                    <div class="h-14 w-14 rounded-full bg-[#A53CFD] flex items-center justify-center font-semibold">
                        <strong class="font-bold text-xl text-white">B</strong>
                    </div>
                    <strong class="text-[#18181B] text-2xl ">Brooklyne</strong>
                </a>
            </div>
            
            <!-- Desktop Navbar -->
            <div class="w-2/3 flex justify-end">
                <nav class="hidden md:flex space-x-4">
                    <a href="#hero" class="bg-[#A53CFD] px-6 py-4 text-white rounded-md font-semibold">Home</a>
                    <a href="#about" class="hover:bg-[#E7E7E8] px-5 py-3 mx-1">About</a>
                    <a href="#process" class="hover:bg-[#E7E7E8] px-5 py-3 mx-1">Process</a>
                    <a href="#portfolio" class="hover:bg-[#E7E7E8] px-5 py-3 mx-1">Portfolio</a>
                    <a href="#blog" class="hover:bg-[#E7E7E8] px-5 py-3 mx-1">Blog</a>
                    <a href="#service" class="hover:bg-[#E7E7E8] px-5 py-3 mx-1">Services</a>
                    <a href="#contact" class="bg-[#A53CFD] px-6 py-4 text-white rounded-md font-semibold text-lg transform hover:scale-105 transition duration-300">contact</a>
                </nav>
            </div>

            <!-- Mobile Menu Btn -->
            <button id="mobilebtn" class="md:hidden text-xl rounded-xl"><i class="fa-solid fa-bars"></i></button>

            <!-- Mobile Menu -->
             <div id="mobilemenu" class="hidden md:hidden flex flex-col px-4 bg-gray-600 justify-center items-center space-y-4">
                <a href="#hero" class="px-4 py-2">Home</a>
                <a href="#about" class="px-4 py-2 mx-1">About</a>
                <a href="#process" class="px-4 py-2 mx-1">Process</a>
                <a href="#portfolio" class="px-4 py-2 mx-1">Portfolio</a>
                <a href="#blog" class="px-4 py-2 mx-1">Blog</a>
                <a href="#service" class="px-4 py-2 mx-1">Services</a>
                <a href="#contact"class="px-4 py-2 mx-1">contact</a>
                    
             </div>
        </div>
    </header>

    <script>
        const btn =document.getElementById('mobilebtn');
        const menu =document.getElementById('mobilemenu');

        btn.addEventListener('click', () =>{
            menu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
